name: CI

on:
  push:
    branches:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      # Garante que o script tenha permissão de execução no Linux
      - name: Make mvnw executable
        run: chmod +x mvnw

      # Adicionamos a flag para definir o diretório explicitamente
      - name: Build
        run: ./mvnw package -DskipTests -Dmaven.multiModuleProjectDirectory=$GITHUB_WORKSPACE

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  test:
    runs-on: ubuntu-latest
    needs: build

    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      # Roda os testes garantindo que o Maven encontre o diretório
      - name: Test
        run: ./mvnw test -Dmaven.multiModuleProjectDirectory=$GITHUB_WORKSPACE
